# ==================== 价格监控系统 Docker Compose ====================
# 一键部署：API服务 + Streamlit前端 + PostgreSQL数据库

version: '3.8'

services:
  # ==================== 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: price_monitor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor123
      POSTGRES_DB: price_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d price_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== API服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price_monitor_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://monitor:monitor123@postgres:5432/price_monitor
      - SCHEDULER_ENABLED=true
      - SCHEDULER_INTERVAL_MINUTES=30
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["python", "main.py"]

  # ==================== Streamlit前端 ====================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price_monitor_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  postgres_data:
    driver: local